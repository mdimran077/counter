<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f7f6;
        }

        .counter-container {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        #counter-value {
            font-size: 64px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 30px;
            transition: color 0.2s ease;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Specific Button Colors */
        .btn-decrement {
            background-color: #e74c3c;
            color: white;
        }

        .btn-decrement:hover {
            background-color: #c0392b;
        }

        .btn-reset {
            background-color: #7f8c8d;
            color: white;
        }

        .btn-reset:hover {
            background-color: #95a5a6;
        }

        .btn-increment {
            background-color: #2ecc71;
            color: white;
        }

        .btn-increment:hover {
            background-color: #27ae60;
        }

        /* Subtle button press effect */
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="counter-container">
        <h1>Counter App</h1>
        <div id="counter-value">0</div>
        
        <div class="btn-container">
            <button class="btn-decrement" id="decrement-btn">Decrease</button>
            <button class="btn-reset" id="reset-btn">Reset</button>
            <button class="btn-increment" id="increment-btn">Increase</button>
        </div>
    </div>

    <script>
        // Select elements from the DOM
        const counterValue = document.getElementById('counter-value');
        const decrementBtn = document.getElementById('decrement-btn');
        const resetBtn = document.getElementById('reset-btn');
        const incrementBtn = document.getElementById('increment-btn');

        // Initial state
        let count = 0;

        // Function to update the text display and color contextually
        function updateDisplay() {
            counterValue.textContent = count;
            
            // Optional styling: change counter number colors based on the value
            if (count > 0) {
                counterValue.style.color = '#2ecc71'; // Green for positive
            } else if (count < 0) {
                counterValue.style.color = '#e74c3c'; // Red for negative
            } else {
                counterValue.style.color = '#2c3e50'; // Dark slate for zero
            }
        }

        // Event Listeners for actions
        incrementBtn.addEventListener('click', () => {
            count++;
            updateDisplay();
        });

        decrementBtn.addEventListener('click', () => {
            count--;
            updateDisplay();
        });

        resetBtn.addEventListener('click', () => {
            count = 0;
            updateDisplay();
        });
    </script>

</body>
</html>
